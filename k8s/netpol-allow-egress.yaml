# FIXED NetworkPolicy - Task 15 resolution.
#
# Replaces the deny-all-egress policy with a least-privilege alternative:
# allows only what the app genuinely needs outbound:
# - Port 53 UDP/TCP to kube-dns (internal name resolution)
# - Port 443 TCP to the internet (ECR image pulls, any HTTPS API calls)
#
# Everything else remains blocked - this is proper defense-in-depth,
# not the accidental total block the previous policy created.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-egress
spec:
  podSelector:
    matchLabels:
      app: task-api
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

    - ports:
        - port: 443
          protocol: TCP
