# DELIBERATELY RESTRICTIVE - Task 15: Kubernetes Networking Issue
#
# This NetworkPolicy blocks ALL egress (outbound traffic) from pods
# labelled app=task-api-dev. It simulates a real mistake: a security
# team applies a "default-deny-all" network policy as hardening, but
# forgets that the app pods still need to reach the Kubernetes DNS
# service (for any internal name resolution) and external services.
#
# Effect after applying this:
# - Pods can still RECEIVE traffic (no ingress rule = ingress is
#   unaffected by a NetworkPolicy that only specifies egress)
# - Pods CANNOT reach the outside world (ECR, external APIs, etc.)
# - Pods CANNOT reach kube-dns (so internal DNS resolution also breaks)
#
# This is applied to the 'dev' namespace only - not test or prod.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-egress
spec:
  podSelector:
    matchLabels:
      app: task-api
  policyTypes:
    - Egress
  egress: []  # empty list = deny all egress
