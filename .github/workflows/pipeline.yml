name: CI/CD Pipeline

# working-directory to './' (repo root), losing the 'app/' prefix set
# in defaults.run. npm ci therefore fails because package.json doesn't
# exist at the repo root, only under app/.
# This mimics a real mistake: developer copies a job from another repo,
# forgets this repo uses a non-root app directory, adds an explicit
# working-directory that looks reasonable but is wrong.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [develop, main]

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: devops-capstone/task-api

defaults:
  run:
    working-directory: app

jobs:
  build-and-test:
    name: CI - Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint (code quality check)
        run: npm run lint

      - name: Run unit tests
        run: npm test -- --ci

      - name: Build artifact
        run: tar -czf task-api-build.tar.gz src package.json package-lock.json

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: task-api-build
          path: app/task-api-build.tar.gz
          retention-days: 7

  dependency-scan:
    name: Security - Dependency Scan (npm audit)
    needs: build-and-test
    runs-on: ubuntu-latest
    # This job-level working-directory overrides the global default of 'app'.
    # It LOOKS like it's setting the root correctly but it actually points
    # npm ci at the repo root where there is no package.json.
    defaults:
      run:
        working-directory: ./
    # ----------------------------------
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Save full audit report (evidence, even if the next step fails)
        if: always()
        run: npm audit --json > npm-audit-report.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: app/npm-audit-report.json
          retention-days: 30

      - name: Fail the pipeline on critical vulnerabilities
        run: npm audit --audit-level=critical

  dependency-review:
    name: Security - Dependency Review (PR only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical

  verify-secrets:
    name: CD - Verify Secret Retrieval (AWS SSM)
    needs: build-and-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Retrieve secret dynamically from SSM Parameter Store
        run: |
          VALUE=$(aws ssm get-parameter \
            --name "/devops-capstone/demo/api-key" \
            --with-decryption \
            --query Parameter.Value \
            --output text)
          echo "Secret retrieved successfully (length: ${#VALUE} characters)."

  build-and-push-image:
    name: CI - Build & Push Docker Image
    needs: [build-and-test, dependency-scan]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.image.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        working-directory: app
        run: |
          docker build -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Wait for ECR image scan to complete
        run: |
          for i in $(seq 1 15); do
            STATUS=$(aws ecr describe-image-scan-findings \
              --repository-name "$ECR_REPOSITORY" \
              --image-id imageTag="${{ steps.image.outputs.tag }}" \
              --region "${{ env.AWS_REGION }}" \
              --query 'imageScanStatus.status' --output text 2>/dev/null || echo "IN_PROGRESS")
            echo "Scan status: $STATUS"
            if [ "$STATUS" = "COMPLETE" ]; then break; fi
            sleep 20
          done

      - name: Save scan findings (evidence, even if the next step fails)
        if: always()
        run: |
          aws ecr describe-image-scan-findings \
            --repository-name "$ECR_REPOSITORY" \
            --image-id imageTag="${{ steps.image.outputs.tag }}" \
            --region "${{ env.AWS_REGION }}" > ecr-scan-findings.json || true

      - name: Upload scan findings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ecr-scan-findings
          path: ecr-scan-findings.json
          retention-days: 30

      - name: Fail the pipeline on critical vulnerabilities in the image
        run: |
          CRITICAL_COUNT=$(aws ecr describe-image-scan-findings \
            --repository-name "$ECR_REPOSITORY" \
            --image-id imageTag="${{ steps.image.outputs.tag }}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'imageScanFindings.findingSeverityCounts.CRITICAL' --output text)
          echo "Critical vulnerabilities found in image: $CRITICAL_COUNT"
          if [ "$CRITICAL_COUNT" != "None" ] && [ "$CRITICAL_COUNT" != "0" ]; then
            echo "::error::$CRITICAL_COUNT critical vulnerabilities found in the image - see ecr-scan-findings artifact"
            exit 1
          fi

  deploy-dev:
    name: CD - Deploy to Dev
    needs: build-and-push-image
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: [self-hosted, k8s-node]
    environment: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure namespace exists
        run: kubectl create namespace dev --dry-run=client -o yaml | kubectl apply -f -

      - name: Refresh ECR pull secret for this namespace
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          kubectl create secret docker-registry ecr-secret \
            --namespace dev \
            --docker-server="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" \
            --docker-username=AWS \
            --docker-password="$(aws ecr get-login-password --region ${{ env.AWS_REGION }})" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Helm
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          helm upgrade --install task-api-dev ./helm/task-api \
            --namespace dev \
            --set image.repository="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}" \
            --set image.tag="${{ needs.build-and-push-image.outputs.image_tag }}" \
            --set replicaCount=1 \
            --set service.nodePort=30080 \
            --wait --timeout 120s

      - name: Show running pods (evidence)
        run: kubectl get pods -n dev -o wide

      - name: Smoke test - real HTTP request against the running app
        run: curl -sf http://localhost:30080/health

  deploy-test:
    name: CD - Deploy to Test
    needs: build-and-push-image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: [self-hosted, k8s-node]
    environment: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure namespace exists
        run: kubectl create namespace test --dry-run=client -o yaml | kubectl apply -f -

      - name: Refresh ECR pull secret for this namespace
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          kubectl create secret docker-registry ecr-secret \
            --namespace test \
            --docker-server="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" \
            --docker-username=AWS \
            --docker-password="$(aws ecr get-login-password --region ${{ env.AWS_REGION }})" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Helm
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          helm upgrade --install task-api-test ./helm/task-api \
            --namespace test \
            --set image.repository="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}" \
            --set image.tag="${{ needs.build-and-push-image.outputs.image_tag }}" \
            --set replicaCount=2 \
            --set service.nodePort=30081 \
            --wait --timeout 120s

      - name: Show running pods (evidence)
        run: kubectl get pods -n test -o wide

      - name: Smoke test - real HTTP request against the running app
        run: curl -sf http://localhost:30081/health

  deploy-prod:
    name: CD - Deploy to Prod
    needs: [build-and-push-image, deploy-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: [self-hosted, k8s-node]
    environment: prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure namespace exists
        run: kubectl create namespace prod --dry-run=client -o yaml | kubectl apply -f -

      - name: Refresh ECR pull secret for this namespace
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          kubectl create secret docker-registry ecr-secret \
            --namespace prod \
            --docker-server="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" \
            --docker-username=AWS \
            --docker-password="$(aws ecr get-login-password --region ${{ env.AWS_REGION }})" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Helm
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          helm upgrade --install task-api-prod ./helm/task-api \
            --namespace prod \
            --set image.repository="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}" \
            --set image.tag="${{ needs.build-and-push-image.outputs.image_tag }}" \
            --set replicaCount=2 \
            --set service.nodePort=30082 \
            --wait --timeout 120s

      - name: Show running pods (evidence)
        run: kubectl get pods -n prod -o wide

      - name: Smoke test - real HTTP request against the running app
        run: curl -sf http://localhost:30082/health
