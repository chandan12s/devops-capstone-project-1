# Default values for the task-api chart.
# Override any of these at install time with --set or -f, e.g.:
#   helm upgrade --install task-api ./helm/task-api --set image.tag=v2

replicaCount: 2

image:
  repository: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/devops-capstone/task-api
  tag: v1
  pullPolicy: IfNotPresent

imagePullSecretName: ecr-secret

service:
  type: NodePort
  port: 80
  targetPort: 3000
  nodePort: 30080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

probes:
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 20